---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: elastic-agent
  namespace: elastic-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: elastic-agent
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - events
      - pods
      - services
      - configmaps
      - serviceaccounts
      - persistentvolumes
      - persistentvolumeclaims
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions"]
    resources:
      - replicasets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - statefulsets
      - deployments
      - replicasets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - nodes/stats
      - nodes/proxy
      - nodes/metrics
    verbs: ["get"]
  - nonResourceURLs:
      - /metrics
    verbs: ["get"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - clusterrolebindings
      - clusterroles
      - rolebindings
      - roles
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: elastic-agent
subjects:
  - kind: ServiceAccount
    name: elastic-agent
    namespace: elastic-agent
roleRef:
  kind: ClusterRole
  name: elastic-agent
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: elastic-agent
  namespace: elastic-agent
  labels:
    app: elastic-agent
spec:
  selector:
    matchLabels:
      app: elastic-agent
  template:
    metadata:
      labels:
        app: elastic-agent
    spec:
      serviceAccountName: elastic-agent
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
      containers:
        - name: elastic-agent
          image: docker.elastic.co/elastic-agent/elastic-agent-complete:9.4.2
          env:
            - name: FLEET_ENROLL
              value: "1"
            - name: FLEET_URL
              value: "https://6b2204615f514e8d8a6613fada53ef11.fleet.us-east-2.aws.elastic-cloud.com:443"
            - name: FLEET_ENROLLMENT_TOKEN
              value: "Y2Q0aTdKNEJjYS1VczVkZFNFVTA6TmVPaVQ3OWk5Qko2VDI5cFJsQzMyZw=="
            - name: FLEET_INSECURE
              value: "false"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ELASTIC_NETINFO
              value: "false"
            # Required for cloud-defend to access host process info
            - name: HOSTFS_PROC_PATH
              value: "/hostfs/proc"
          securityContext:
            runAsUser: 0
            capabilities:
              add:
                - BPF
                - PERFMON
                - SYS_RESOURCE
                - NET_ADMIN
                - SYS_PTRACE
                - DAC_READ_SEARCH
          resources:
            requests:
              memory: "500Mi"
              cpu: "100m"
            limits:
              memory: "1200Mi"
              cpu: "1000m"
          volumeMounts:
            - name: proc
              mountPath: /hostfs/proc
              readOnly: true
            - name: cgroup
              mountPath: /hostfs/sys/fs/cgroup
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: etc-full
              mountPath: /hostfs/etc
              readOnly: true
            - name: var-lib
              mountPath: /hostfs/var/lib
              readOnly: true
            - name: etc-mid
              mountPath: /etc/machine-id
              readOnly: true
            - name: sys-kernel-debug
              mountPath: /sys/kernel/debug
            # Required for cloud-defend (D4C)
            - name: boot
              mountPath: /boot
              readOnly: true
            - name: sys-fs-bpf
              mountPath: /sys/fs/bpf
            - name: sys-kernel-security
              mountPath: /sys/kernel/security
              readOnly: true
            # k3s containerd socket
            - name: containerd-sock
              mountPath: /run/k3s/containerd/containerd.sock
            - name: elastic-agent-state
              mountPath: /usr/share/elastic-agent/state
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: varlog
          hostPath:
            path: /var/log
        - name: etc-full
          hostPath:
            path: /etc
        - name: var-lib
          hostPath:
            path: /var/lib
        - name: etc-mid
          hostPath:
            path: /etc/machine-id
            type: File
        - name: sys-kernel-debug
          hostPath:
            path: /sys/kernel/debug
        # Required for cloud-defend (D4C)
        - name: boot
          hostPath:
            path: /boot
        - name: sys-fs-bpf
          hostPath:
            path: /sys/fs/bpf
        - name: sys-kernel-security
          hostPath:
            path: /sys/kernel/security
        # k3s containerd socket
        - name: containerd-sock
          hostPath:
            path: /run/k3s/containerd/containerd.sock
        - name: elastic-agent-state
          hostPath:
            path: /var/lib/elastic-agent-state
            type: DirectoryOrCreate
